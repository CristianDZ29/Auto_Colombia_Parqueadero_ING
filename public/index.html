<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parqueadero Auto Colombia</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div class="header-inner">
            <div class="header-brand">
                <h1>Parqueadero <span>Auto Colombia</span></h1>
            </div>
            <div class="header-actions">
                <a href="historial.html" class="btn btn-outline">Historial de Vehiculos</a>
                <a href="usuarios.html" class="btn btn-outline">Gestionar Usuarios</a>
            </div>
        </div>
    </header>

    <main class="container">

        <!-- Registro de Entrada -->
        <section class="panel">
            <h2>Registro de Entrada</h2>
            <form id="formEntrada">
                <div class="form-group">
                    <label for="selectVehiculoEntrada">Seleccionar Vehículo Registrado:</label>
                    <select id="selectVehiculoEntrada" required>
                        <option value="">Cargando vehículos...</option>
                    </select>
                    <small id="infoVehiculoEntrada" class="info-hint"></small>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Registrar Entrada</button>
            </form>
            <div id="mensajeEntrada" class="mensaje"></div>
        </section>

        <!-- Registro de Salida -->
        <section class="panel">
            <h2>Registro de Salida</h2>
            <form id="formSalida">
                <div class="form-group">
                    <label for="selectSalidaCeldas">Celda ocupada (opcional):</label>
                    <select id="selectSalidaCeldas">
                        <option value="">Seleccione una celda para autocompletar la placa...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="salPlaca">Placa del Vehículo:</label>
                    <input type="text" id="salPlaca" placeholder="ABC-123" required>
                </div>
                <button type="submit" class="btn btn-warning btn-full">Registrar Salida</button>
            </form>
            <div id="mensajeSalida" class="mensaje"></div>
        </section>

        <!-- Estado de Celdas -->
        <section class="panel panel-full">
            <div class="section-header">
                <h2>Estado de Celdas</h2>
                <div class="celdas-leyenda">
                    <span class="badge badge-libre">Libre</span>
                    <span class="badge badge-ocupada">Ocupada</span>
                    <span class="badge badge-sin-asignar">Sin usuario</span>
                </div>
            </div>
            <div class="celdas-tabs">
                <button class="tab-btn active" data-filter="all">Todas</button>
                <button class="tab-btn" data-filter="Carro">Carros</button>
                <button class="tab-btn" data-filter="Moto">Motos</button>
            </div>
            <div id="gridCeldas" class="grid-celdas"></div>
        </section>


    </main>

    <script src="js/app.js"></script>
</body>

</html>
